name: Seite automatisch neu bauen und veröffentlichen

on:
  push:
    branches: [main]
    paths:
      - "posts/**"
      - "templates/**"
      - "static/**"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Abhängigkeiten installieren
        run: pip install markdown jinja2

      - name: Seite bauen
        run: python build_site.py

      - name: GitHub Pages Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Auf GitHub Pages veröffentlichen
        uses: actions/deploy-pages@v4
